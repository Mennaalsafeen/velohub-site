<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Bike Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
    <a class="navbar-brand" href="index.html text-success">Bike Shop</a>
    <div class="navbar-nav ms-auto">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="products.html">Products</a>
    <a class="nav-link active" href="contactus.html">Contact Us</a>
    </div>
    </div>
    </nav>

    <div class="container py-5">
    <div class="row justify-content-center">
    <div class="col-md-6">
    <div class="card shadow-lg border-0">
    <div class="card-header bg-success text-white text-center py-3">
    <h3><i class="fas fa-envelope me-2"></i>Contact Us</h3>
    </div>
    <div class="card-body p-4">
    <form id="contactForm">
    <div class="mb-3">
    <label class="form-label fw-bold">Your Name</label>
    <input type="text" class="form-control" id="userName" required>
    </div>
    <div class="mb-3">
    <label class="form-label fw-bold">Email Address</label>
    <input type="email" class="form-control" id="userEmail" required>
    </div>
    <div class="mb-3">
    <label class="form-label fw-bold">Message</label>
    <textarea class="form-control" rows="4" id="userMessage" required></textarea>
    </div>
    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Send Message</button>
    </form>
    </div>
    </div>
    </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('تم إرسال رسالتك بنجاح! شكراً لتواصلك معنا.');
        this.reset(); 
         });
    </script>
</body>
</html>

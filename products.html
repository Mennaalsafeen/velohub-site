    <div class="container my-5">
    <h2 class="text-center mb-4">Our Bicycle Collection</h2>
    <div id="bike-list" class="row">
    <div class="col-md-4 mb-4">
    <div class="card shadow">
    <img src="/images/1 (1).jpg" class="card-img-top" alt="Bike">
    <div class="card-body">
    <h5>Mountain Master</h5>
    <p class="text-muted">$450.00</p>
    <button class="btn btn-outline-dark"><i class="fas fa-shopping-cart"></i> Buy Now</button>
    </div>
    </div>
    </div>
    <div class="col-md-4 mb-4">
    <div class="card shadow">
    <img src="/images/1 (2).jpg" class="card-img-top" alt="Bike">
    <div class="card-body">
    <h5>Mountain Master</h5>
    <p class="text-muted">$500.00</p>
    <button class="btn btn-outline-dark"><i class="fas fa-shopping-cart"></i> Buy Now</button>
    </div>
    </div>
    </div>
    <div class="col-md-4 mb-4">
    <div class="card shadow">
    <img src="/images/1 (3).jpg" class="card-img-top" alt="Bike">

    </div>

    <div class="text-center mt-5">
    <p>Don't see what you want?</p>
    <button class="btn btn-success btn-lg" onclick="addNewBike()">
    <i class="fas fa-plus-circle"></i> Load More Models
    </button>
    </div>
    </div>
    <script>
    function addNewBike() {
    const bikeList = document.getElementById("bike-list");
    const newCard = document.createElement("div");
    newCard.className = "col-md-4 mb-4 mt-3";
   newCard.innerHTML = `
        <div class="card border-success shadow">
            <div class="card-body text-center">
                <i class="fas fa-bicycle fa-3x text-success mb-2"></i>
                <h5>Special Edition Bike</h5>
                <p class="text-success fw-bold">$599.00</p>
                <span class="badge bg-warning text-dark">New Arrival</span>
            </div>
        </div>`;
        
        bikeList.appendChild(newCard);
    }
    </script>

    <script src="./js/bootstrap.bundle.min.js.map"></script>

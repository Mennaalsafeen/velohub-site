<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloHub - Premium Bikes</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>.carousel-item img {height: 500px; object-fit: cover;}</style>
</head>
<body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-bicycle"></i> VeloHub</a> 
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li> 
        <li class="nav-item"><a class="nav-link" href="products.html">products</a></li>
        <li class="nav-item"><a class="nav-link" href="contactus.html">Contact Us</a></li>
        </ul>
        </div>
        </div>
        </nav>
        <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
        <div class="carousel-item active">
        <img src="./images/1 (4).jpg" class="d-block w-100" alt="Bike 1">
        <div class="carousel-caption d-none d-md-block">
        <h1>Experience Freedom</h1>
        </div>
        </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev"> [cite: 29]
        <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next"> [cite: 29]
        <span class="carousel-control-next-icon"></span>
        </button>
        </div>
        <div class="container my-5 text-center">
        <h2>Our Latest Arrivals</h2>
        <div id="bike-container" class="row mt-4">
        </div>
        <button class="btn btn-success mt-3" onclick="addBike()">Show More Bikes <i class="fas fa-plus"></i></button> [cite: 52]
        </div>
        <div class="container text-center mb-5">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#offerModal">Check Special Offer</button>
        </div>
        <div class="modal fade" id="offerModal" tabindex="-1">
        <div class="modal-dialog">
        <div class="modal-content">
        <div class="modal-header">
        <h5 class="modal-title">Limited Time Offer!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Get 20% off on all mountain bikes this week!
        </div>
        </div>
        </div>
        </div>
        <script>

        function addBike() {
        const container = document.getElementById("bike-container"); [cite, 60]
        const div = document.createElement("div"); [cite, 57]
        div.className = "col-md-4 mb-3"; [cite, 58]
        div.innerHTML = `
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <i class="fas fa-bicycle fa-3x mb-3 text-success"></i>
                <h5 class="card-title">Professional Bike</h5>
                <p class="card-text">High quality for city tours.</p>
            </div>
        </div>`;
        container.appendChild(div);
    }
    </script>

    <script src="./js/bootstrap.bundle.min.js.map"></script>
</body>
</html>
